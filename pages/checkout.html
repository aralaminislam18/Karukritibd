<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>কারুকৃতি-Karukriti</title>
<link rel="stylesheet" href="../css/main.css?v=2">
<link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  .co-item-row { display: flex; justify-content: space-between; font-size: 13.5px; padding: 6px 0; }
  .co-item-row span:last-child { font-weight: 600; }
  .trx-box { display: none; margin-top: 10px; }
  .trx-box.show { display: block; }
  .payment-detail-note { background: #fff8e6; border: 1px solid #f0d878; padding: 10px 12px; border-radius: 10px; font-size: 12.5px; color: #7a5c00; margin-top: 8px; }

  /* Auth (login/register) */
  .surface-card { background:#fff; border-radius:14px; padding:16px; }

  /* Receipt */
  .receipt-card { background:#fff; border-radius:14px; padding:20px; }
  .receipt-header { text-align:center; margin-bottom:14px; padding-bottom:14px; border-bottom:2px dashed var(--border); }
  .receipt-row { display:flex; justify-content:space-between; font-size:13px; padding:5px 0; gap:10px; }
  .receipt-row span:first-child { color:#6b7280; }
  .receipt-row span:last-child { font-weight:600; text-align:right; }
  .receipt-total { border-top:2px dashed var(--border); margin-top:8px; padding-top:10px; font-weight:800; font-size:16px; }
  .receipt-total span:first-child { color: inherit; }
</style>
</head>
<body>

<header class="site-header">
  <div class="flex items-center gap-12">
    <a href="#" onclick="history.back(); return false;" class="icon-btn" style="width:auto;height:auto;background:none;">←</a>
    <span class="logo-text">চেকআউট</span>
  </div>
</header>

<div class="page-pad" id="checkoutContent">
  <div class="spinner"></div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script type="module" src="../js/checkout.js?v=2"></script>
</body>
</html>
