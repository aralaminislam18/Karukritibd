  <div class="banner-dots" id="bannerDots"></div>
</div>

<!-- Categories -->
<div class="category-scroll" id="categoryScroll"></div>

<!-- Products -->
<div class="section-heading">
  <h2 id="productsHeading">সব প্রোডাক্ট</h2>
</div>
<div class="product-grid" id="productGrid">

<!-- Admin secret login modal -->
<div class="modal-overlay center" id="adminModal">
  <div class="modal-sheet" style="max-width:320px; text-align:center;">
    <div class="modal-handle"></div>
    <div style="font-size:32px; margin-bottom:10px;">🔒</div>
    <div class="modal-title">এডমিন লগইন</div>
    <p class="text-muted" style="font-size:13px; margin-bottom:16px;">পাসওয়ার্ড দিন</p>
    <input type="password" class="form-input pin-input" id="adminPinInput" maxlength="10" placeholder="••••••" style="text-align:center; letter-spacing:6px;">
    <div class="login-error" id="adminPinError"></div>
    <div class="flex gap-8" style="margin-top:10px;">
      <button class="btn btn-outline btn-block" id="adminCancelBtn">বাতিল</button>
      <button class="btn btn-primary btn-block" id="adminSubmitBtn">প্রবেশ</button>
    </div>
  </div>
</div>
